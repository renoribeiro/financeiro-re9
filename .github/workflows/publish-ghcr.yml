# =============================================================================
# Publica a imagem Docker da RE9 Finanças no GitHub Packages (GHCR) a cada push
# na main (e sob demanda). O Dokploy então só PUXA a imagem — sem buildar na VPS.
#
# Não precisa de segredo/PAT: usa o GITHUB_TOKEN automático do Actions, que tem
# permissão de publicar pacotes (packages: write). A imagem sai em:
#   ghcr.io/renoribeiro/financeiro-re9:latest
# =============================================================================
name: Publish image (GHCR)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadados/tags da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
